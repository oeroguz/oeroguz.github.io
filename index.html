<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallz</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #5B4FCF;
      --purple-dark: #3d3490;
      --purple-light: #7b6fe8;
      --bg: #0e0c1a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(91,79,207,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo-wrap {
      position: relative;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(91,79,207,0.35) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 24px 64px rgba(0,0,0,0.5),
        0 0 80px rgba(91,79,207,0.3);
      position: relative;
      z-index: 1;
    }

    .store-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .store-btn:hover {
      background: rgba(91,79,207,0.3);
      border-color: rgba(91,79,207,0.6);
      transform: translateY(-2px);
    }

    .store-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.6; }
    }
  </style>
</head>
